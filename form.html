<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/form.css" >
    <script src="./js/form.js"></script>
</head>
<body>

    <div class="pagina-form">
            <div class="contenedor-form">
                <h1 class="titulo-form">Contactanos</h1>
                <form class='tarea-formulario'>
                    <input class='tarea-input' id="nombre" type='text' placeholder="Ingresa el nombre"/>
                    <input class='tarea-input' id="mail" type='email' placeholder="Ingresa el correo"/>
                    <input class='tarea-input' id="asunto" type='text' placeholder="Ingresa el asunto"/>
                    <textarea class='tarea-input' id="mensaje" placeholder="Ingresa el mensaje del correo" 
                    name="comentarios" rows="5" cols="30"></textarea>
                    
                </form>
                <div class="contenedor-botones">
                    <button class='tarea-boton' onclick='ingresarInformacion()'>Ingresar</button>
                    <button class='tarea-boton' onclick='vaciarCampos()'>Limpiar</button>
                </div>
            </div>
        </div>

</body>
</html>
